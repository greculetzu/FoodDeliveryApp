version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: fooddelivery_db
    environment:
      POSTGRES_DB: fooddelivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - fooddelivery_data:/var/lib/postgresql/data

volumes:
  fooddelivery_data:
